<body>

    <script>
         
         
          const calculator = {
            add: function(a,b){
                return a+b;
            },
            sub: function(a,b){
                return a-b;
            },
            mul: function(a,b){
                return a * b;
            }
        };
         console.log(calculator.add(4,6));
          console.log(calculator.sub(8,4));
        console.log( calculator.mul(2,4));

    </script>
</body>
