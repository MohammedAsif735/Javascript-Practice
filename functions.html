<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Function</title>
</head>
<body>
    <script>
       // Normal Function (Basic way)
        function addition(a,b){
            console.log(a+b);
        }
        addition(7,4);

        // Function Expression
         const add = function(n,m){
            console.log(n+m);
        }
        add(4,3);

        // Arrow Function (Modern way 🚀)
      const sum = (a,b) => a + b;
      console.log(sum(3,5));

       

        

</script>
</body>
</html>
